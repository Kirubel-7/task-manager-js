<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Flow</title>
    <link rel="stylesheet" href="css/style.css" />
    <link href="https://fonts.googleapis.com/css?family=Lora|Ubuntu:400,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Wrapper -->
    <div class="container">
        <h1>Task Flow</h1>

        <!-- task-form -->
        <section class="task-form-card">
            <h2>Create New Task</h2>

            <form action="#" class="task-form">
                <div class="form-field">
                <label for="task-title">Task Title</label>
                <input type="text" id="task-title">
                </div>
                
                <div class="form-field">
                <label for="task-description">Task Description</label>
                <textarea name="task description" id="task-description"></textarea>
                </div>

                <div class="form-actions">
                <button type="submit" class="add-btn">Add Task</button>
                </div>
            </form>
        </section>

        <!-- task filter controls -->
        <section class="task-filters">
            <h2>Filter Tasks</h2>

            <div class="filter-buttons">
                <button type="button" data-filter="all" aria-pressed="true">All</button>
                <button type="button" data-filter="completed" aria-pressed="false">Completed</button>
                <button type="button" data-filter="pending" aria-pressed="false">Pending</button>
            </div>

        </section>

        <!-- filtered tasks section -->
        <section class="task-list-section">
            <h2 class="visually-hidden">Task List</h2>
                <ul class="task-list" id="task-list">
                    <!-- JS will insert task items here -->
                    <!-- list of {checkbox, content, actions} -->
                </ul>
        </section>

        <!-- Task status section -->
         <section class="task-status">
            <h2>Task Status</h2>

            <div class="status-card">
                <dl class="status-list">

                    <div class="status-item total-tasks">
                         <dt class="status-term">Total Tasks</dt>
                         <dd class="status-value" id="total-tasks-count">0</dd>
                    </div>

                    <div class="status-item completed-tasks">
                         <dt class="status-term">Completed Tasks</dt>
                         <dd class="status-value" id="completed-tasks-count">0</dd>
                    </div>
                </dl>
            </div>
         </section>

    </div>
    

    <script src="js/script.js" defer></script>
    <!-- The defer attribute is a modern best practice, which tells the browser 
     to download the script in the background without blocking the HTML parsing,
      and to execute it only after the HTML document is fully parsed. -->
  </body>
</html>
