<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Flow</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    
    <div class="container">

    <!-- /////////// Header /////////// -->
    <header class="header">
        <h1 class="task-title">Task Flow</h1>
    </header>

    <!-- /////////// Task Input Form //////////// -->
      <div class="card form-section">
        <h2>Create New Task</h2>
       <form action="#" method="post">
        <div class="form-group">
            <label for="task-title">Task Title</label>
            <input type="text" id="task-title" class="form-input" placeholder="Enter task title...">
        </div>
        <div class="form-group">
            <label class="form-label" for="task-description">Task Description</label>
            <textarea id="task-description" class="form-textarea" placeholder="Enter task description..."></textarea>
        </div>
        <div class="button-group">
            <button class="button button-primary">Add Task</button>
        </div>
       </form>
    </div>

    <!-- Filter Section -->
        <div class="filter-section">
            <button class="filter-button active">All</button>
            <button class="filter-button">Completed</button>
            <button class="filter-button">Pending</button>
        </div>

    <!-- Task List -->
        <div class="task-list">
            <div class="task-card">
                <div class="task-content">
                    <input type="checkbox" class="checkbox">
                    <div class="task-info">
                        <h3 class="task-title">Design UI Mockups</h3>
                        <p class="task-description">Create high-fidelity mockups for the new dashboard interface</p>
                    </div>

                    <div class="task-actions">
                        <button class="icon-button edit">Edit </button>
                        <button class="icon-button delete">Delete</button>
                    </div>
                </div>
            </div>
        </div>    
      
    <!--  //////////// Stats Section ///////////-->
      <div class="stats-card">
       <div class="stats-container">
        <div class="total-tasks">
            <h3 id="tt num">5</h3>
            <p>Total Tasks</p>
        </div>
        <div class="divider">-------------</div>
        <div class="completed-tasks">
            <h3 id="ct num">2</h3>
            <p>Completed Tasks</p>
        </div>
       </div>
    </div>

    </div>

    

    <script src="js/script.js" defer></script>
    <!-- The defer attribute is a modern best practice, which tells the browser 
     to download the script in the background without blocking the HTML parsing,
      and to execute it only after the HTML document is fully parsed. -->
  </body>
</html>
